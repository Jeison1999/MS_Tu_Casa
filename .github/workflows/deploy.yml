name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build Angular project
      run: npm run build -- --configuration production --base-href /
    
    - name: List build output
      run: |
        echo "=== Build complete, checking output ==="
        ls -la dist/mscasa/
    
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -p 33 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy to server via rsync
      run: |
        rsync -avz --delete -e "ssh -p 33 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
          dist/mscasa/ \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/mstucasa.com/html/
    
    - name: Set correct permissions
      run: |
        ssh -p 33 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          "chown -R www-data:www-data /var/www/mstucasa.com/html && chmod -R 755 /var/www/mstucasa.com/html"