name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build Angular project
      run: npm run build -- --configuration production --base-href /
    
    - name: List build output (for debugging)
      run: |
        echo "Contents of dist/mscasa/browser:"
        ls -la dist/mscasa/browser/
    
    - name: Deploy to server via SSH
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 33
        source: "dist/mscasa/browser/*"
        target: "/var/www/mstucasa.com/html/"
        strip_components: 3
        rm: true
    
    - name: Set correct permissions
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 33
        script: |
          chown -R www-data:www-data /var/www/mstucasa.com/html
          chmod -R 755 /var/www/mstucasa.com/html